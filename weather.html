<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- create your application title and brand -->

    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Weather App</h1>

        <form id="searchForm">
            <input
                type="text"
                id="cityInput"
                placeholder="Enter city name ... "
                required
            >
            <button type="submit">Search</button>
        </form>

        <button id="geoBtn">📍 Use My Location</button>

        <div id="loading" class="hidden">Loading ...</div>
        <div id="error" class="hidden"></div>

        <div id="weather" class="hidden">
            <img id="weatherIcon" src="" alt="Weather Icon">
        </img>
            <h2 id="cityName"></h2>
            <p id="temp"></p>
            <p id="description"></p>
            <p id="details"></p>
        </div>
    </div>

    <button id="forecastBtn" class="hidden">Show Forecast</button>

    <!-- 5-day forecast -->
<div id="forecast" class="hidden">
    <h3>5-Day Forecast</h3>
    <div id="forecastCards"></div>
</div>

<div id="recentSection" class="hidden">
    <p class="recent-label">Recent Searches:</p>
    <div id="recentList"></div>
</div>

<button id="toggleUnit">Switch to Fahrenheit</button>

    <script src="config.js"></script>
    <script src="main.js"></script>
</body>
</html>
